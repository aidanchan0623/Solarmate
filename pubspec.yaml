name: solarmate
description: Premium Flutter Admin Dashboard for SolarMate Energy Management Platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # If you have assets
  # assets:
  #   - assets/images/
  #   - assets/fonts/

  # Fonts example (if not using Google Fonts)
  # fonts:
